services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pexo
      POSTGRES_PASSWORD: pexopassword
      POSTGRES_DB: pexo
    ports:
      - "5432:5432"
    volumes:
      - pexo_data:/var/lib/postgresql/data

  pexo_core:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://pexo:pexopassword@db:5432/pexo
    volumes:
      # Mount the local system's docker socket for the Resource Manager agent to monitor host container stats
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the current directory so Pexo can read/write directly to the workspace
      - .:/workspace

volumes:
  pexo_data:
